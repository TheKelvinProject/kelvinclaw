name: Plugin ABI Compat

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compat:
    name: ABI Compat (${{ matrix.plugin }})
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - kelvin.cli
          - kelvin.openai
          - kelvin.anthropic
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Verify external plugin ABI compatibility
        run: scripts/test-plugin-abi-compat.sh --plugin "${{ matrix.plugin }}"
