name: Release Linux Executables

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-linux-executables-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: blacksmith-4vcpu-ubuntu-2404
            target: x86_64-unknown-linux-gnu
          - runner: blacksmith-4vcpu-ubuntu-2404-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1

      - name: Build and package Linux executables
        run: scripts/package-linux-release.sh --target "${{ matrix.target }}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/releases/*.tar.gz
            dist/releases/*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    if: ${{ github.event_name == 'push' }}
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          files: |
            release-assets/*.tar.gz
            release-assets/*.tar.gz.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
