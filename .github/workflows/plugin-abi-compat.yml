name: Plugin ABI Compat

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compat:
    name: ABI Compat (${{ matrix.plugin }})
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - kelvin.cli
          - kelvin.openai
          - kelvin.anthropic
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Verify external plugin ABI compatibility
        run: scripts/test-plugin-abi-compat.sh --plugin "${{ matrix.plugin }}"
