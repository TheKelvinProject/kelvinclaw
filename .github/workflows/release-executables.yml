name: Release Executables

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional release version label (for example 0.1.3 or v0.1.3)
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-executables-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: blacksmith-4vcpu-ubuntu-2404
            target: x86_64-unknown-linux-gnu
          - runner: blacksmith-4vcpu-ubuntu-2404-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable

      - name: Restore Rust cache
        uses: useblacksmith/rust-cache@f53e7f127245d2a269b3d90879ccf259876842d5
        with:
          workspaces: . -> target/releases
          key: release-${{ matrix.target }}

      - name: Resolve release version
        shell: bash
        env:
          RAW_RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          raw_version="${RAW_RELEASE_VERSION}"
          if [[ -z "${raw_version}" ]]; then
            raw_version="$(awk -F'"' '/^version = "/ {print $2; exit}' Cargo.toml)"
          fi
          normalized_version="${raw_version#v}"
          if [[ ! "${normalized_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version: ${raw_version}" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=${normalized_version}" >> "${GITHUB_ENV}"

      - name: Build and package Linux release artifacts
        run: scripts/package-linux-release.sh --target "${{ matrix.target }}" --version "${RELEASE_VERSION}"

      - name: Upload Linux release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/releases/*.tar.gz
            dist/releases/*.tar.gz.sha256
            dist/releases/*.deb
            dist/releases/*.deb.sha256
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Resolve release version
        shell: bash
        env:
          RAW_RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          raw_version="${RAW_RELEASE_VERSION}"
          if [[ -z "${raw_version}" ]]; then
            raw_version="$(awk -F'"' '/^version = "/ {print $2; exit}' Cargo.toml)"
          fi
          normalized_version="${raw_version#v}"
          if [[ ! "${normalized_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version: ${raw_version}" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=${normalized_version}" >> "${GITHUB_ENV}"

      - name: Build and package macOS release artifacts
        shell: bash
        run: scripts/package-macos-release.sh --target "${{ matrix.target }}" --version "${RELEASE_VERSION}"

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/releases/*.tar.gz
            dist/releases/*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: blacksmith-4vcpu-windows-2025
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable

      - name: Restore Rust cache
        uses: useblacksmith/rust-cache@f53e7f127245d2a269b3d90879ccf259876842d5
        with:
          workspaces: . -> target/releases
          key: release-${{ matrix.target }}

      - name: Resolve release version
        shell: pwsh
        env:
          RAW_RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version || '' }}
        run: |
          $RawVersion = $env:RAW_RELEASE_VERSION
          if (-not $RawVersion) {
            $RawVersion = Select-String -Path "Cargo.toml" -Pattern '^version = "(.+)"$' | Select-Object -First 1 | ForEach-Object { $_.Matches[0].Groups[1].Value }
          }
          $NormalizedVersion = $RawVersion -replace '^v', ''
          if ($NormalizedVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "Invalid release version: $RawVersion"
          }
          "RELEASE_VERSION=$NormalizedVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build and package Windows release artifacts
        shell: pwsh
        run: scripts/package-windows-release.ps1 -Target "${{ matrix.target }}" -Version "${env:RELEASE_VERSION}"

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/releases/*.zip
            dist/releases/*.zip.sha256
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    if: ${{ github.event_name == 'push' }}
    needs:
      - build-linux
      - build-macos
      - build-windows
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          files: |
            release-assets/*.tar.gz
            release-assets/*.tar.gz.sha256
            release-assets/*.zip
            release-assets/*.zip.sha256
            release-assets/*.deb
            release-assets/*.deb.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
