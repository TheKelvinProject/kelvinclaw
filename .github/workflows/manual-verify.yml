name: Manual Verify

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Verification suite to run
        required: true
        type: choice
        default: quick
        options:
          - quick
          - full
      rust_toolchain:
        description: Rust toolchain
        required: true
        type: string
        default: stable

permissions:
  contents: read

concurrency:
  group: manual-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ inputs.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_toolchain }}

      - name: Cargo check (workspace)
        run: cargo check --workspace -q

      - name: Cargo test (workspace)
        if: ${{ inputs.suite == 'full' }}
        run: cargo test --workspace -q
